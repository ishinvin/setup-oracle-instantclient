name: Test Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Oracle Instant Client (default)
        id: oracle
        uses: ./
        with:
          version: "19.30.0.0.0"

      - name: Verify installation
        run: |
          echo "oracle-home=${{ steps.oracle.outputs.oracle-home }}"
          echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}"
          ls -la "${{ steps.oracle.outputs.oracle-home }}"

  test-basic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Oracle Instant Client (basic)
        id: oracle
        uses: ./
        with:
          version: "19.30.0.0.0"
          variant: "basic"

      - name: Verify installation
        run: |
          echo "oracle-home=${{ steps.oracle.outputs.oracle-home }}"
          ls -la "${{ steps.oracle.outputs.oracle-home }}"

  test-v23:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Oracle Instant Client (v23)
        id: oracle
        uses: ./
        with:
          version: "23.26.1.0.0"

      - name: Verify installation
        run: |
          echo "oracle-home=${{ steps.oracle.outputs.oracle-home }}"
          ls -la "${{ steps.oracle.outputs.oracle-home }}"

  test-godror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Oracle Instant Client
        uses: ./
        with:
          version: "19.30.0.0.0"

      - name: Verify godror can load Oracle client
        run: |
          cd $(mktemp -d)
          go mod init test
          go get github.com/godror/godror
          cat <<'EOF' > main.go
          package main

          import (
            "database/sql"
            "fmt"
            "strings"
            _ "github.com/godror/godror"
          )

          func main() {
            db, err := sql.Open("godror", "")
            if err != nil {
              panic(err)
            }
            defer db.Close()
            err = db.Ping()
            if err != nil && strings.Contains(err.Error(), "DPI-1047") {
              panic("Oracle client library not loaded: " + err.Error())
            }
            fmt.Println("Oracle client loaded successfully")
          }
          EOF
          go run main.go
