name: Test Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Oracle Instant Client (default)
        uses: ./
        with:
          version: "19.30.0.0.0"

      - name: Verify installation
        run: |
          echo "ORACLE_HOME=${ORACLE_HOME}"
          echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}"
          ls -la "${ORACLE_HOME}"

  test-basic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Oracle Instant Client (basic)
        uses: ./
        with:
          version: "19.30.0.0.0"
          variant: "basic"

      - name: Verify installation
        run: |
          echo "ORACLE_HOME=${ORACLE_HOME}"
          ls -la "${ORACLE_HOME}"

  test-v23:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Oracle Instant Client (v23)
        uses: ./
        with:
          version: "23.26.1.0.0"

      - name: Verify installation
        run: |
          echo "ORACLE_HOME=${ORACLE_HOME}"
          ls -la "${ORACLE_HOME}"

  test-godror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Oracle Instant Client
        uses: ./
        with:
          version: "19.30.0.0.0"

      - name: Verify godror can load Oracle client
        run: |
          cd $(mktemp -d)
          go mod init test
          go get github.com/godror/godror
          cat <<'EOF' > main.go
          package main

          import (
            "fmt"
            "github.com/godror/godror"
          )

          func main() {
            fmt.Println("godror version:", godror.Version)
          }
          EOF
          go run main.go
