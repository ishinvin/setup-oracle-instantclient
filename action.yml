name: "Setup Oracle Instant Client"
description: "Download and setup Oracle Instant Client on a GitHub Actions runner"
author: "ishinvin"

branding:
  icon: "database"
  color: "red"

inputs:
  version:
    description: "Oracle Instant Client version (e.g. 19.30.0.0.0)"
    required: true
  variant:
    description: "Package variant: basic or basiclite"
    required: false
    default: "basiclite"

outputs:
  oracle-home:
    description: "Path to the Oracle Instant Client installation"
    value: ${{ steps.setup.outputs.oracle-home }}

runs:
  using: "composite"
  steps:
    - name: Setup Oracle Instant Client
      id: setup
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        VARIANT: ${{ inputs.variant }}
      run: |
        set -euo pipefail

        # Validate inputs
        if [[ "${VARIANT}" != "basic" && "${VARIANT}" != "basiclite" ]]; then
          echo "::error::Invalid variant '${VARIANT}'. Must be 'basic' or 'basiclite'."
          exit 1
        fi

        # Use sudo when not root
        SUDO=$(command -v sudo || true)

        # Install dependencies
        if command -v apt-get &> /dev/null; then
          $SUDO apt-get -qq update > /dev/null
          $SUDO apt-get -qq install -y libaio1 2>/dev/null || $SUDO apt-get -qq install -y libaio1t64 > /dev/null
        elif command -v yum &> /dev/null; then
          $SUDO yum install -y -q curl unzip libaio
        else
          echo "::warning::Unknown package manager. Ensure curl, unzip, and libaio are installed."
        fi
        curl --version 2>/dev/null || echo "curl: not found"
        unzip -v 2>/dev/null || echo "unzip: not found"

        INSTALL_DIR="${RUNNER_TOOL_CACHE:-/tmp}/oracle-instantclient/${VERSION}"

        # Download if not cached
        if [[ ! -d "${INSTALL_DIR}/instantclient" ]]; then
          ARCH=$([ "$(uname -m)" = "x86_64" ] && echo "x64" || echo "arm64")
          PATH_SEGMENT=$(echo "${VERSION}" | tr -d '.')
          BASE_URL="https://download.oracle.com/otn_software/linux/instantclient/${PATH_SEGMENT}"

          TMP_DIR=$(mktemp -d)
          URL="${BASE_URL}/instantclient-${VARIANT}-linux.${ARCH}-${VERSION}dbru.zip"
          echo "Downloading Oracle Instant Client ${VERSION} (${VARIANT}) for ${ARCH}..."
          if ! curl -fsSL -o "${TMP_DIR}/instantclient.zip" "${URL}" 2>/dev/null; then
            URL="${BASE_URL}/instantclient-${VARIANT}-linux.${ARCH}-${VERSION}.zip"
            if ! curl -fsSL -o "${TMP_DIR}/instantclient.zip" "${URL}"; then
              echo "::error::Failed to download Oracle Instant Client ${VERSION} (${VARIANT}) for ${ARCH}. Check version and architecture."
              exit 1
            fi
          fi

          $SUDO mkdir -p "${INSTALL_DIR}"
          $SUDO unzip -qo "${TMP_DIR}/instantclient.zip" -d "${INSTALL_DIR}"
          rm -rf "${TMP_DIR}"
          $SUDO ln -sfn "${INSTALL_DIR}"/instantclient_* "${INSTALL_DIR}/instantclient"
        else
          echo "Oracle Instant Client ${VERSION} already cached"
        fi

        ORACLE_HOME=$(readlink -f "${INSTALL_DIR}/instantclient")
        echo "Oracle Instant Client: ${ORACLE_HOME}"
        echo "oracle-home=${ORACLE_HOME}" >> "$GITHUB_OUTPUT"

        # Configure environment
        echo "ORACLE_HOME=${ORACLE_HOME}" >> "$GITHUB_ENV"
        echo "LD_LIBRARY_PATH=${ORACLE_HOME}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
